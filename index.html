<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Windy City Weapon Stats</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <div class="title">
        GUN SPINNER
    </div>



    <!-- Tier Selection -->

    <div class="tiers">

        <button class="tier-btn active" data-tier="Tier 0">
            Tier 0
        </button>


        <button class="tier-btn" data-tier="Tier 1">
            Tier 1
        </button>


        <button class="tier-btn" data-tier="Tier 1.5">
            Tier 1.5
        </button>


        <button class="tier-btn" data-tier="Tier 2">
            Tier 2
        </button>

    </div>




    <!-- Spinner Pointer -->

    <div class="pointer"></div>




    <!-- Gun Spinner -->

    <div class="spinner-box">

        <div id="spinner">
            Press Spin
        </div>

    </div>





    <!-- Spin Button -->

    <button id="spin">
        SPIN
    </button>





    <!-- Weapon Card -->

    <div class="weapon-card">


        <div class="weapon-name" id="weaponName">

            No Drop

        </div>



        <div class="weapon-type">

            Selected Weapon

        </div>




        <div class="rarity-bar">


            <div class="rarity-fill"></div>


        </div>


    </div>





    <!-- Result -->

    <div id="result">

        Ready to spin...

    </div>



</div>





<script src="script.js"></script>


</body>

</html>
